name: Job Agent

on:
  schedule:
    # Monday & Friday at 4:30 PM ET (21:30 UTC)
    - cron: "30 21 * * 1,5"
  workflow_dispatch: # allow manual trigger

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install .

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Write .env from secrets
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          printf '%s\n' \
            "OPENAI_API_KEY=${OPENAI_API_KEY}" \
            "SERPAPI_KEY=${SERPAPI_KEY}" \
            "SMTP_HOST=smtp.gmail.com" \
            "SMTP_PORT=587" \
            "SMTP_USER=mohammedfauzan44@gmail.com" \
            "SMTP_PASSWORD=${SMTP_PASSWORD}" \
            "NOTIFICATION_EMAIL=mohammedfauzan44@gmail.com" \
            > .env

      - name: Create data directory
        run: mkdir -p data/screenshots

      - name: Restore database from previous run
        uses: dawidd6/action-download-artifact@v3
        with:
          name: job-agent-db
          path: data/
          search_artifacts: true
          if_no_artifact_found: warn
        continue-on-error: true

      - name: Run job agent
        run: python -m src.cli run --no-dry-run --yes

      - name: Save database for next run
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: job-agent-db
          path: data/jobs.db
          retention-days: 90
          overwrite: true

      - name: Save screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: job-agent-screenshots-${{ github.run_number }}
          path: data/screenshots/
          retention-days: 30
          if-no-files-found: ignore
