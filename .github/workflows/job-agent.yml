name: Job Agent

on:
  schedule:
    # Every Thursday at 4:30 PM ET (21:30 UTC)
    - cron: "30 21 * * 4"
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write
  pages: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: pip install .

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Install LaTeX (for CV PDF generation)
        run: sudo apt-get install -y texlive-latex-base texlive-latex-recommended texlive-fonts-recommended texlive-latex-extra

      - name: Write .env from secrets
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          printf '%s\n' \
            "OPENAI_API_KEY=${OPENAI_API_KEY}" \
            "SERPAPI_KEY=${SERPAPI_KEY}" \
            "SMTP_HOST=smtp.gmail.com" \
            "SMTP_PORT=587" \
            "SMTP_USER=mohammedfauzan44@gmail.com" \
            "SMTP_PASSWORD=${SMTP_PASSWORD}" \
            "NOTIFICATION_EMAIL=mohammedfauzan44@gmail.com" \
            > .env

      - name: Create data directories
        run: mkdir -p data/screenshots reports output dashboard

      - name: Restore database from previous run
        uses: dawidd6/action-download-artifact@v3
        with:
          name: job-agent-db
          path: data/
          search_artifacts: true
          if_no_artifact_found: warn
        continue-on-error: true

      # === UNIFIED PIPELINE ===
      # discover -> score -> evaluate (Claude API) -> generate PDF -> apply -> digest -> export
      - name: Run unified pipeline
        run: python -m src.cli run --no-dry-run --yes

      # === EXPORT DASHBOARD ===
      - name: Export dashboard data
        if: always()
        run: python -m src.cli export-dashboard

      # === SAVE ARTIFACTS ===
      - name: Save database for next run
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: job-agent-db
          path: data/jobs.db
          retention-days: 90
          overwrite: true

      - name: Save screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: job-agent-screenshots-${{ github.run_number }}
          path: data/screenshots/
          retention-days: 30
          if-no-files-found: ignore

      - name: Save reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: job-agent-reports-${{ github.run_number }}
          path: reports/
          retention-days: 90
          if-no-files-found: ignore

      - name: Save PDFs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: job-agent-pdfs-${{ github.run_number }}
          path: output/
          retention-days: 90
          if-no-files-found: ignore

      # === COPY PDFS AND REPORTS INTO DASHBOARD FOR DOWNLOAD ===
      - name: Bundle PDFs and reports for dashboard
        if: always()
        run: |
          mkdir -p dashboard/output dashboard/reports
          cp output/*.pdf dashboard/output/ 2>/dev/null || true
          cp reports/*.md dashboard/reports/ 2>/dev/null || true
          echo "PDFs: $(ls dashboard/output/ 2>/dev/null | wc -l), Reports: $(ls dashboard/reports/ 2>/dev/null | wc -l)"

      # === DEPLOY DASHBOARD TO GITHUB PAGES ===
      - name: Deploy dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard
          publish_branch: gh-pages
