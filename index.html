<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Agent Dashboard</title>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --border: #334155;
    --text: #e2e8f0; --muted: #94a3b8; --accent: #3b82f6;
    --green: #22c55e; --yellow: #eab308; --red: #ef4444;
    --cyan: #06b6d4; --purple: #a855f7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

  header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  header h1 { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, var(--cyan), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  header .meta { color: var(--muted); font-size: 13px; }

  /* Stats cards */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
  .stat-card .number { font-size: 32px; font-weight: 700; }
  .stat-card .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; }
  .stat-card.green .number { color: var(--green); }
  .stat-card.blue .number { color: var(--accent); }
  .stat-card.yellow .number { color: var(--yellow); }
  .stat-card.cyan .number { color: var(--cyan); }
  .stat-card.purple .number { color: var(--purple); }

  /* Funnel */
  .funnel { display: flex; gap: 4px; margin-bottom: 24px; align-items: end; }
  .funnel-step { flex: 1; background: var(--surface); border-radius: 8px; padding: 10px; text-align: center; border: 1px solid var(--border); position: relative; }
  .funnel-step .count { font-size: 20px; font-weight: 700; }
  .funnel-step .name { font-size: 11px; color: var(--muted); }
  .funnel-step::after { content: ''; position: absolute; right: -6px; top: 50%; transform: translateY(-50%); border: 5px solid transparent; border-left-color: var(--border); }
  .funnel-step:last-child::after { display: none; }

  /* Controls */
  .controls { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .search { flex: 1; min-width: 200px; padding: 8px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; }
  .search:focus { border-color: var(--accent); }
  .filter-btn { padding: 6px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); cursor: pointer; font-size: 13px; }
  .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .sort-select { padding: 6px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; }

  /* Tabs */
  .tabs { display: flex; gap: 2px; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
  .tab { padding: 8px 16px; cursor: pointer; color: var(--muted); font-size: 13px; border-bottom: 2px solid transparent; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab .badge { background: var(--surface); padding: 1px 6px; border-radius: 10px; font-size: 11px; margin-left: 4px; }

  /* Job table */
  .job-table { width: 100%; border-collapse: separate; border-spacing: 0; }
  .job-table th { text-align: left; padding: 10px 12px; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); cursor: pointer; }
  .job-table th:hover { color: var(--text); }
  .job-table td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
  .job-table tr:hover td { background: rgba(59,130,246,0.05); }
  .job-table tr.expanded td { background: rgba(59,130,246,0.08); }

  .score-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-weight: 600; font-size: 13px; }
  .score-high { background: rgba(34,197,94,0.15); color: var(--green); }
  .score-mid { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .score-low { background: rgba(148,163,184,0.15); color: var(--muted); }

  .status-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
  .status-applied { background: rgba(34,197,94,0.15); color: var(--green); }
  .status-evaluated { background: rgba(59,130,246,0.15); color: var(--accent); }
  .status-interview { background: rgba(168,85,247,0.15); color: var(--purple); }
  .status-offer { background: rgba(34,197,94,0.3); color: var(--green); font-weight: 700; }
  .status-rejected { background: rgba(239,68,68,0.15); color: var(--red); }
  .status-default { background: rgba(148,163,184,0.1); color: var(--muted); }

  /* Expanded detail */
  .detail-row td { padding: 16px 12px; background: var(--surface); }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .detail-section h4 { font-size: 12px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  .detail-section p { font-size: 13px; line-height: 1.5; }
  .detail-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .detail-tag { font-size: 11px; padding: 2px 6px; background: rgba(6,182,212,0.15); color: var(--cyan); border-radius: 3px; }
  .detail-link { color: var(--accent); text-decoration: none; font-size: 13px; }
  .detail-link:hover { text-decoration: underline; }

  /* Story bank */
  .story-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 12px; }
  .story-card h3 { font-size: 15px; margin-bottom: 8px; }
  .story-card .star { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .story-card .star strong { color: var(--text); }

  /* Section headers */
  .section-header { font-size: 18px; font-weight: 600; margin: 32px 0 16px; display: flex; align-items: center; gap: 8px; }
  .section-header::before { content: ''; width: 3px; height: 20px; background: var(--accent); border-radius: 2px; }

  /* Empty state */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }

  /* Responsive */
  @media (max-width: 768px) {
    .stats { grid-template-columns: repeat(3, 1fr); }
    .detail-grid { grid-template-columns: 1fr; }
    .funnel { flex-wrap: wrap; }
    .funnel-step::after { display: none; }
  }

  /* Action buttons */
  .action-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .action-btn { display: inline-block; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 13px; font-weight: 600; cursor: pointer; border: none; }
  .action-apply { background: var(--accent); color: white; }
  .action-apply:hover { background: #2563eb; }
  .action-pdf { background: var(--green); color: #0f172a; }
  .action-pdf:hover { background: #16a34a; color: white; }
  .action-report { background: var(--purple); color: white; }
  .action-report:hover { background: #7c3aed; }

  .hidden { display: none; }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>Job Agent Dashboard</h1>
    <div class="meta">
      <span id="lastUpdated"></span>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats" id="statsGrid"></div>

  <!-- Funnel -->
  <div class="funnel" id="funnel"></div>

  <!-- Tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Controls -->
  <div class="controls">
    <input type="text" class="search" id="search" placeholder="Search company, role, archetype...">
    <select class="sort-select" id="sortSelect">
      <option value="score">Sort by Score</option>
      <option value="date">Sort by Date</option>
      <option value="company">Sort by Company</option>
      <option value="status">Sort by Status</option>
    </select>
  </div>

  <!-- Job Table -->
  <table class="job-table" id="jobTable">
    <thead>
      <tr>
        <th>Score</th>
        <th>Company</th>
        <th>Role</th>
        <th>Status</th>
        <th>Archetype</th>
        <th>Remote</th>
      </tr>
    </thead>
    <tbody id="jobBody"></tbody>
  </table>

  <!-- Story Bank -->
  <div id="storySection" class="hidden">
    <h2 class="section-header">Interview Story Bank</h2>
    <div id="storyList"></div>
  </div>

  <!-- Empty state -->
  <div class="empty hidden" id="emptyState">
    <h3>No data yet</h3>
    <p>Run the pipeline to populate the dashboard:<br><code>python -m src.cli run</code></p>
  </div>

</div>

<script>
let DATA = null;
let currentTab = 'all';
let currentSort = 'score';
let expandedId = null;

async function loadData() {
  try {
    const resp = await fetch('data.json');
    DATA = await resp.json();
    render();
  } catch (e) {
    document.getElementById('emptyState').classList.remove('hidden');
  }
}

function render() {
  if (!DATA || !DATA.jobs || DATA.jobs.length === 0) {
    document.getElementById('emptyState').classList.remove('hidden');
    return;
  }

  renderMeta();
  renderStats();
  renderFunnel();
  renderTabs();
  renderJobs();
  renderStories();

  document.getElementById('search').addEventListener('input', renderJobs);
  document.getElementById('sortSelect').addEventListener('change', (e) => {
    currentSort = e.target.value;
    renderJobs();
  });
}

function renderMeta() {
  const d = new Date(DATA.generated_at);
  document.getElementById('lastUpdated').textContent = 'Updated ' + d.toLocaleDateString() + ' ' + d.toLocaleTimeString();
}

function renderStats() {
  const s = DATA.stats;
  const cards = [
    { label: 'Discovered', value: s.total_discovered, cls: 'blue' },
    { label: 'Scored', value: s.total_scored, cls: 'cyan' },
    { label: 'Evaluated', value: s.total_evaluated, cls: 'purple' },
    { label: 'Applied', value: s.total_applied, cls: 'green' },
    { label: 'Avg Score', value: s.avg_score ? s.avg_score.toFixed(1) : '0', cls: 'yellow' },
  ];
  document.getElementById('statsGrid').innerHTML = cards.map(c =>
    `<div class="stat-card ${c.cls}"><div class="number">${c.value}</div><div class="label">${c.label}</div></div>`
  ).join('');
}

function renderFunnel() {
  const sc = DATA.stats.status_counts || {};
  const steps = [
    { name: 'Discovered', count: DATA.stats.total_discovered },
    { name: 'Scored', count: DATA.stats.total_scored },
    { name: 'Evaluated', count: sc.evaluated || 0 },
    { name: 'Applied', count: sc.applied || 0 },
    { name: 'Interview', count: sc.interview || 0 },
    { name: 'Offer', count: sc.offer || 0 },
  ];
  document.getElementById('funnel').innerHTML = steps.map(s =>
    `<div class="funnel-step"><div class="count">${s.count}</div><div class="name">${s.name}</div></div>`
  ).join('');
}

function renderTabs() {
  const sc = DATA.stats.status_counts || {};
  const tabs = [
    { id: 'all', label: 'All', count: DATA.jobs.length },
    { id: 'evaluated', label: 'Evaluated', count: sc.evaluated || 0 },
    { id: 'applied', label: 'Applied', count: sc.applied || 0 },
    { id: 'interview', label: 'Interview', count: sc.interview || 0 },
    { id: 'top', label: 'Top (4+)', count: DATA.jobs.filter(j => j.score_5 >= 4.0).length },
  ];
  document.getElementById('tabs').innerHTML = tabs.map(t =>
    `<div class="tab ${currentTab === t.id ? 'active' : ''}" onclick="setTab('${t.id}')">${t.label}<span class="badge">${t.count}</span></div>`
  ).join('');
}

function setTab(tab) {
  currentTab = tab;
  renderTabs();
  renderJobs();
}

function getFilteredJobs() {
  let jobs = [...DATA.jobs];
  const q = document.getElementById('search').value.toLowerCase();

  // Tab filter
  if (currentTab === 'evaluated') jobs = jobs.filter(j => j.status === 'evaluated');
  else if (currentTab === 'applied') jobs = jobs.filter(j => j.status === 'applied');
  else if (currentTab === 'interview') jobs = jobs.filter(j => j.status === 'interview');
  else if (currentTab === 'top') jobs = jobs.filter(j => j.score_5 >= 4.0);

  // Search filter
  if (q) {
    jobs = jobs.filter(j =>
      (j.company || '').toLowerCase().includes(q) ||
      (j.title || '').toLowerCase().includes(q) ||
      (j.archetype || '').toLowerCase().includes(q) ||
      (j.location || '').toLowerCase().includes(q)
    );
  }

  // Sort
  jobs.sort((a, b) => {
    if (currentSort === 'score') return (b.score_5 || 0) - (a.score_5 || 0);
    if (currentSort === 'date') return (b.discovered_at || '').localeCompare(a.discovered_at || '');
    if (currentSort === 'company') return (a.company || '').localeCompare(b.company || '');
    if (currentSort === 'status') return statusRank(b.status) - statusRank(a.status);
    return 0;
  });

  return jobs;
}

function statusRank(s) {
  const ranks = { offer: 6, interview: 5, responded: 4, applied: 3, evaluated: 2, discovered: 1, rejected: 0, discarded: 0, skipped: 0 };
  return ranks[s] || 1;
}

function scoreClass(s) {
  if (s >= 4.0) return 'score-high';
  if (s >= 3.0) return 'score-mid';
  return 'score-low';
}

function statusClass(s) {
  if (s === 'applied') return 'status-applied';
  if (s === 'evaluated') return 'status-evaluated';
  if (s === 'interview') return 'status-interview';
  if (s === 'offer') return 'status-offer';
  if (s === 'rejected') return 'status-rejected';
  return 'status-default';
}

function renderJobs() {
  const jobs = getFilteredJobs();
  const tbody = document.getElementById('jobBody');
  let html = '';

  for (const j of jobs) {
    const isExpanded = expandedId === j.id;
    html += `<tr class="${isExpanded ? 'expanded' : ''}" onclick="toggleDetail('${j.id}')" style="cursor:pointer">
      <td><span class="score-badge ${scoreClass(j.score_5)}">${j.score_5 ? j.score_5.toFixed(1) : '-'}</span></td>
      <td><strong>${esc(j.company)}</strong></td>
      <td>${esc(j.title)}</td>
      <td><span class="status-badge ${statusClass(j.status)}">${esc(j.status)}</span></td>
      <td style="color:var(--muted);font-size:13px">${esc(j.archetype || '')}</td>
      <td style="color:var(--muted);font-size:13px">${esc(j.remote || '')}</td>
    </tr>`;

    if (isExpanded) {
      // Build action buttons
      let actions = '';
      if (j.posting_url) {
        actions += `<a class="action-btn action-apply" href="${j.posting_url}" target="_blank">Apply Now</a>`;
      }
      if (j.has_pdf && j.pdf_path) {
        actions += `<a class="action-btn action-pdf" href="${j.pdf_path}" download>Download Tailored CV (PDF)</a>`;
      }
      if (j.has_report && j.report_path) {
        actions += `<a class="action-btn action-report" href="${j.report_path}" target="_blank">View Full Report</a>`;
      }

      // Auto-apply status
      let applyNote = '';
      if (j.can_auto_apply) {
        applyNote = j.status === 'applied'
          ? '<span style="color:var(--green)">Auto-applied</span>'
          : `<span style="color:var(--cyan)">Auto-apply available (${esc(j.ats_type)})</span>`;
      } else {
        applyNote = '<span style="color:var(--yellow)">Manual apply needed (custom ATS)</span>';
      }

      html += `<tr class="detail-row"><td colspan="6">
        <div class="detail-grid">
          <div class="detail-section">
            <h4>Summary</h4>
            <p>${esc(j.tl_dr || j.reasoning || 'No evaluation yet')}</p>
            ${j.comp_estimate ? `<p style="margin-top:8px"><strong>Comp:</strong> ${esc(j.comp_estimate)}</p>` : ''}
            ${j.match_pct !== null && j.match_pct !== undefined ? `<p><strong>CV Match:</strong> ${j.match_pct}%</p>` : ''}
            <p style="margin-top:8px">${applyNote}</p>
            ${actions ? `<div class="action-buttons">${actions}</div>` : ''}
          </div>
          <div class="detail-section">
            <h4>Details</h4>
            <p><strong>Location:</strong> ${esc(j.location || 'Unknown')}</p>
            <p><strong>ATS:</strong> ${esc(j.ats_type || 'Unknown')}</p>
            <p><strong>Score (100):</strong> ${j.score_100 || '-'}</p>
            <p><strong>Seniority:</strong> ${esc(j.seniority || 'Unknown')}</p>
            ${j.recommendation ? `<p><strong>Recommendation:</strong> ${esc(j.recommendation)}</p>` : ''}
          </div>
        </div>
      </td></tr>`;
    }
  }

  tbody.innerHTML = html || '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:40px">No jobs match your filters</td></tr>';
}

function toggleDetail(id) {
  expandedId = expandedId === id ? null : id;
  renderJobs();
}

function renderStories() {
  const stories = DATA.story_bank || [];
  if (stories.length === 0) return;

  document.getElementById('storySection').classList.remove('hidden');
  document.getElementById('storyList').innerHTML = stories.map(s => `
    <div class="story-card">
      <h3>${esc(s.title)}</h3>
      <div class="star">
        <p><strong>S:</strong> ${esc(s.situation)}</p>
        <p><strong>T:</strong> ${esc(s.task)}</p>
        <p><strong>A:</strong> ${esc(s.action)}</p>
        <p><strong>R:</strong> ${esc(s.result)}</p>
        <p><strong>Reflection:</strong> ${esc(s.reflection)}</p>
      </div>
      <div class="detail-tags">${(s.tags || []).map(t => `<span class="detail-tag">${esc(t)}</span>`).join('')}</div>
    </div>
  `).join('');
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

loadData();
</script>
</body>
</html>
